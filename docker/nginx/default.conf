server {
listen 80;
server_name localhost;
root /app/public;
index index.php;

charset utf-8;

# Headers de sécurité
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Assets statiques — servis directement, sans PHP
location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
expires 30d;
add_header Cache-Control "public, immutable";
try_files $uri =404;
}
# Toutes les autres requêtes → Symfony (index.php)
location / {
try_files $uri /index.php$is_args$args;
}
# Transmet les requêtes PHP à PHP-FPM (port 9000 du conteneur "php")
location ~ ^/index\.php(/|$) {
fastcgi_pass php:9000;
fastcgi_split_path_info ^(.+\.php)(/.*)$;
include fastcgi_params;
fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
fastcgi_param DOCUMENT_ROOT $realpath_root;
internal;
}
# Bloque l'accès direct aux autres fichiers .php (sécurité)
location ~ \.php$ {
return 404;
}
}
