services:
  php:
    user: root # Nécessaire pour que composer ait les droits d'écriture sur vendor_data
    environment:
      APP_DEBUG: 1
      XDEBUG_MODE: "off" # Changer en "debug" pour activer Xdebug
    
  database:
    ports:
      - "3307:3306" # Accès MySQL depuis votre machine (DBeaver, TablePlus…)
# Port 3307 pour éviter le conflit avec Laragon